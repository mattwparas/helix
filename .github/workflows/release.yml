name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      RUSTFLAGS: "-C debuginfo=1"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Clone Helix (steel-event-system)
        run: |
          git clone --depth 1 --branch steel-event-system https://github.com/mattwparas/helix.git helix

      - name: Build Helix (steel) (verbose)
        working-directory: helix
        run: cargo xtask steel -vv

      - name: Package Helix
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/helix
          cp helix/target/release/hx dist/helix/
          cp -r helix/runtime dist/helix/
          tar -czf helix-steel-${{ runner.os }}.tar.gz -C dist helix

      - name: Prep nrepl.hx source
        run: |
          if [ -f nrepl.hx-main.zip ] && [ ! -d nrepl.hx-main ]; then
            unzip -q nrepl.hx-main.zip
          fi
          test -d nrepl.hx-main

      - name: Build nrepl.hx
        working-directory: nrepl.hx-main
        run: cargo build --release -vv

      - name: Package nrepl.hx
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/nrepl.hx/target-release
          cp -r nrepl.hx-main/install.sh dist/nrepl.hx/ || true
          cp -r nrepl.hx-main/nrepl.scm dist/nrepl.hx/ || true
          cp -r nrepl.hx-main/cogs dist/nrepl.hx/ || true
          cp -r nrepl.hx-main/target/release/* dist/nrepl.hx/target-release/ || true
          tar -czf nrepl.hx-${{ runner.os }}.tar.gz -C dist nrepl.hx

      - name: Publish Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            helix-steel-${{ runner.os }}.tar.gz
            nrepl.hx-${{ runner.os }}.tar.gz

