name: release

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"
        type: choice
        options:
          - info
          - warning
          - debug
      buildHelix:
        description: "Build Helix (steel-event-system)"
        required: true
        default: true
        type: boolean
      buildNreplHx:
        description: "Build nrepl.hx"
        required: true
        default: true
        type: boolean
      publishRelease:
        description: "Publish a GitHub Release (uploads assets)"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-maybe-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      RUSTFLAGS: "-C debuginfo=1"
      LOG_LEVEL: ${{ github.event.inputs.logLevel || 'warning' }}
      BUILD_HELIX: ${{ github.event.inputs.buildHelix || 'true' }}
      BUILD_NREPL_HX: ${{ github.event.inputs.buildNreplHx || 'true' }}
      # On tag pushes, always publish; on manual runs, respect publishRelease input.
      SHOULD_PUBLISH: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event.inputs.publishRelease == 'true') }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: System info
        run: |
          uname -a
          rustc -Vv
          cargo -V
          df -h
          free -h || true

      # ----------------------------
      # Build Helix (Steel fork)
      # ----------------------------
      - name: Clone Helix (steel-event-system)
        if: ${{ env.BUILD_HELIX == 'true' }}
        run: |
          git clone --depth 1 --branch steel-event-system https://github.com/mattwparas/helix.git helix

      - name: Build Helix (steel)
        if: ${{ env.BUILD_HELIX == 'true' }}
        working-directory: helix
        run: |
          if [ "${LOG_LEVEL}" = "debug" ]; then
            cargo xtask steel -vv
          else
            cargo xtask steel
          fi

      - name: Package Helix asset
        if: ${{ env.BUILD_HELIX == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/helix
          cp helix/target/release/hx dist/helix/
          cp -r helix/runtime dist/helix/
          tar -czf helix-steel-${{ runner.os }}.tar.gz -C dist helix

      # ----------------------------
      # Build nrepl.hx
      # ----------------------------
      - name: Ensure nrepl.hx source present
        if: ${{ env.BUILD_NREPL_HX == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f nrepl.hx-main.zip ] && [ ! -d nrepl.hx-main ]; then
            unzip -q nrepl.hx-main.zip
          fi
          test -d nrepl.hx-main

      - name: Build nrepl.hx
        if: ${{ env.BUILD_NREPL_HX == 'true' }}
        working-directory: nrepl.hx-main
        run: |
          if [ "${LOG_LEVEL}" = "debug" ]; then
            cargo build --release -vv
          else
            cargo build --release
          fi

      - name: Package nrepl.hx asset
        if: ${{ env.BUILD_NREPL_HX == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/nrepl.hx/target-release
          cp -r nrepl.hx-main/install.sh dist/nrepl.hx/ || true
          cp -r nrepl.hx-main/nrepl.scm dist/nrepl.hx/ || true
          cp -r nrepl.hx-main/cogs dist/nrepl.hx/ || true
          cp -r nrepl.hx-main/target/release/* dist/nrepl.hx/target-release/ || true
          tar -czf nrepl.hx-${{ runner.os }}.tar.gz -C dist nrepl.hx

      # Always upload build outputs as run artifacts
      - name: Upload assets as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}
          path: |
            helix-steel-${{ runner.os }}.tar.gz
            nrepl.hx-${{ runner.os }}.tar.gz

      # Publish to GitHub Releases only when SHOULD_PUBLISH is true
      - name: Publish GitHub Release assets
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            helix-steel-${{ runner.os }}.tar.gz
            nrepl.hx-${{ runner.os }}.tar.gz
