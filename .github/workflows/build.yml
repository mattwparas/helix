# .github/workflows/build.yml
name: build-artifacts

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"
        type: choice
        options:
          - info
          - warning
          - debug
      buildHelix:
        description: "Build Helix (steel-event-system)"
        required: true
        default: true
        type: boolean
      buildNreplHx:
        description: "Build nrepl.hx"
        required: true
        default: true
        type: boolean
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      RUSTFLAGS: "-C debuginfo=1"
      # workflow_dispatch inputs exist only for manual runs; fall back for push/PR
      LOG_LEVEL: ${{ github.event.inputs.logLevel || 'warning' }}
      BUILD_HELIX: ${{ github.event.inputs.buildHelix || 'true' }}
      BUILD_NREPL_HX: ${{ github.event.inputs
